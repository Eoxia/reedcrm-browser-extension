<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title><span data-i18n="opt_53"></span></title>
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <div class="options-container">
        <div class="header">
            <img src="icon32.png" alt="Logo" class="logo">
            <h2>Option Extension ReedCRM</h2>
        </div>

        <!-- Section de Gestion des Profils -->
        <div class="profile-manager" style="margin-bottom: 20px; padding: 15px; background: #eef2f5; border-radius: 6px; border: 1px solid #cbd5e1;">
            <div style="display: flex; gap: 10px; margin-bottom: 15px; align-items: center;">
                <label for="doli-profile-select" style="margin: 0; font-size: 13px;"><span data-i18n="opt_54"></span></label>
                <select id="doli-profile-select" style="flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; font-weight: bold; background-color: #fff;"></select>
                <button id="btn-new-profile" style="display: inline-flex; justify-content: center; align-items: center; gap: 4px; padding: 0; box-sizing: border-box; width: 120px; height: 31px; background-color: #27ae60; color: white; border: none; border-radius: 4px; font-size: 13px; font-weight: bold; cursor: pointer;" data-i18n-title="opt_title_96">
                    <svg width="12" height="12" fill="currentColor" viewBox="0 0 448 512"><path d="M256 80c0-17.7-14.3-32-32-32s-32 14.3-32 32V224H48c-17.7 0-32 14.3-32 32s14.3 32 32 32H192V432c0 17.7 14.3 32 32 32s32-14.3 32-32V288H400c17.7 0 32-14.3 32-32s-14.3-32-32-32H256V80z"/></svg><span data-i18n="opt_55"></span></button>
            </div>
            
            <div class="form-group" style="margin-bottom: 0;">
                <label for="doli-profile-name" style="font-size: 12px; margin-bottom: 4px;"><span data-i18n="opt_56"></span></label>
                <input type="text" id="doli-profile-name" data-i18n-placeholder="opt_ph_101" style="width: 100%; box-sizing: border-box; padding: 8px; font-size: 13px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ccc;">
                <div style="display: flex; gap: 10px;">
                    <button id="save-btn" style="display: inline-flex; justify-content: center; align-items: center; gap: 8px; padding: 8px 16px; background-color: #27ae60; color: white; border: none; border-radius: 4px; font-size: 13px; font-weight: bold; cursor: pointer;" data-i18n-title="opt_title_97">
                        <svg width="14" height="14" fill="currentColor" viewBox="0 0 448 512"><path d="M64 32C28.7 32 0 60.7 0 96V416c0 35.3 28.7 64 64 64H384c35.3 0 64-28.7 64-64V173.3c0-17-6.7-33.3-18.7-45.3L352 50.7C340 38.7 323.7 32 306.7 32H64zm0 96c0-17.7 14.3-32 32-32H288c17.7 0 32 14.3 32 32v64c0 17.7-14.3 32-32 32H96c-17.7 0-32-14.3-32-32V128zM224 256a64 64 0 1 1 0 128 64 64 0 1 1 0-128z"/></svg><span data-i18n="opt_57"></span></button>
                    <button id="btn-test-profile" style="display: inline-flex; justify-content: center; align-items: center; gap: 8px; padding: 8px 16px; background-color: #3498db; color: white; border: none; border-radius: 4px; font-size: 13px; font-weight: bold; cursor: pointer;" data-i18n-title="opt_title_98">
                        <svg width="14" height="14" fill="currentColor" viewBox="0 0 512 512"><path d="M439 7c9.4-9.4 24.6-9.4 33.9 0l32 32c9.4 9.4 9.4 24.6 0 33.9l-87 87 39 39c6.9 6.9 8.9 17.2 5.2 26.2s-12.5 14.8-22.2 14.8H296c-13.3 0-24-10.7-24-24V72c0-9.7 5.8-18.5 14.8-22.2s19.3-1.7 26.2 5.2l39 39L439 7zM72 272H216c13.3 0 24 10.7 24 24V440c0 9.7-5.8 18.5-14.8 22.2s-19.3 1.7-26.2-5.2l-39-39L73 505c-9.4 9.4-24.6 9.4-33.9 0L7 473c-9.4-9.4-9.4-24.6 0-33.9l87-87L55 313c-6.9-6.9-8.9-17.2-5.2-26.2s12.5-14.8 22.2-14.8z"/></svg><span data-i18n="opt_58"></span></button>
                    <button id="btn-delete-profile" style="display: inline-flex; justify-content: center; align-items: center; gap: 8px; padding: 8px 16px; background-color: #e74c3c; color: white; border: none; border-radius: 4px; font-size: 13px; font-weight: bold; cursor: pointer;" data-i18n-title="opt_title_99">
                        <svg width="14" height="14" fill="currentColor" viewBox="0 0 448 512"><path d="M135.2 17.7L128 32H32C14.3 32 0 46.3 0 64S14.3 96 32 96H416c17.7 0 32-14.3 32-32s-14.3-32-32-32H320l-7.2-14.3C307.4 6.8 296.3 0 284.2 0H163.8c-12.1 0-23.2 6.8-28.6 17.7zM416 128H32L53.2 467c1.6 25.3 22.6 45 47.9 45H346.9c25.3 0 46.3-19.7 47.9-45L416 128z"/></svg><span data-i18n="opt_59"></span></button>
                </div>
            </div>
            <!-- Zone d'affichage des résultats du test -->
            <div id="test-status-container" style="margin-top: 10px; font-size: 13px; font-weight: bold; text-align: center;"></div>
            <div id="status" style="margin-top: 5px; font-size: 13px; font-weight: bold; text-align: center;"></div>
        </div>

        <fieldset class="settings-section" id="profile-settings-section">
            <legend><span data-i18n="opt_60"></span></legend>
            <div class="form-group">
                <label for="doli-url"><span data-i18n="opt_61"></span></label>
                <div class="input-with-status">
                    <input type="url" id="doli-url" placeholder="https://..." required>
                    <span id="api-status-indicator" class="status-indicator"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="doli-login"><span data-i18n="opt_62"></span></label>
                <input type="text" id="doli-login" data-i18n-placeholder="opt_ph_102" required>
            </div>

            <div class="form-group">
                <label for="doli-password"><span data-i18n="opt_63"></span></label>
                <input type="password" id="doli-password" data-i18n-placeholder="opt_ph_103" required>
            </div>

            <div class="form-group" style="display: flex; flex-direction: row; align-items: center; justify-content: space-between; background-color: #fff; padding: 10px 15px; border-radius: 6px; border: 1px solid #e0e0e0;">
                <label for="doli-auto-assign" style="margin: 0; cursor: pointer; display: inline-block; font-size: 13px; font-weight: 600; flex: 1; padding-right: 10px;"><span data-i18n="opt_64"></span></label>
                <input type="checkbox" id="doli-auto-assign" style="margin: 0; cursor: pointer; width: 18px; height: 18px; flex-shrink: 0;">
            </div>

            <div class="form-group" style="margin-top: 15px;">
                <label for="doli-entity"><span data-i18n="opt_65"></span></label>
                <input type="text" id="doli-entity" data-i18n-placeholder="opt_ph_104">
            </div>

            <div id="permissions-dashboard" class="permissions-dashboard hidden">
                <!-- Généré dynamiquement en JS -->
            </div>
        </fieldset>

        <fieldset class="settings-section">
            <legend><span data-i18n="opt_66"></span></legend>
            <p style="font-size: 11px; color: #7f8c8d; margin-bottom: 10px; margin-top: 0;"><span data-i18n="opt_67"></span></p>
            <div class="form-group">
                <label for="doli-ticket-type"><span data-i18n="opt_68"></span></label>
                <input type="text" id="doli-ticket-type" data-i18n-placeholder="opt_ph_105">
            </div>
            <div class="form-group">
                <label for="doli-ticket-severity"><span data-i18n="opt_69"></span></label>
                <input type="text" id="doli-ticket-severity" data-i18n-placeholder="opt_ph_106">
            </div>
            <div class="form-group">
                <label for="doli-ticket-category"><span data-i18n="opt_70"></span></label>
                <input type="text" id="doli-ticket-category" data-i18n-placeholder="opt_ph_107">
            </div>
        </fieldset>

        <fieldset class="settings-section">
            <legend><span data-i18n="opt_71"></span></legend>
            <p style="font-size: 11px; color: #7f8c8d; margin-bottom: 10px; margin-top: 0;">
                Associez les identifiants (ID) renvoyés par Dolibarr à leur vraie valeur. Un par ligne sous la forme <code><span data-i18n="opt_72"></span></code> (Ex: <code><span data-i18n="opt_73"></span></code>).<br>
                <i>Pour consulter votre dictionnaire dans Dolibarr il faut cliquer sur <b><span data-i18n="opt_74"></span></b> (Le nom du Dictionnaire : Origines ou Raison refus).</i>
            </p>
            <div class="form-group" style="position: relative;">
                <textarea id="doli-dict-map" rows="5" data-i18n-placeholder="opt_ph_108" style="width: 100%; box-sizing: border-box; padding: 8px; font-size: 13px; border-radius: 4px; border: 1px solid #ccc; font-family: monospace;"></textarea>
                <div style="text-align: right; margin-top: 5px;">
                    <button id="btn-update-dict" type="button" style="display: inline-flex; justify-content: center; align-items: center; gap: 6px; padding: 6px 12px; background-color: #3498db; color: white; border: none; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer;" data-i18n-title="opt_title_100">
                        <svg width="12" height="12" fill="currentColor" viewBox="0 0 512 512"><path d="M105.1 202.6c7.7-21.8 20.2-42.3 37.8-59.8c62.5-62.5 163.8-62.5 226.3 0L386.3 160H336c-13.3 0-24 10.7-24 24s10.7 24 24 24H432c13.3 0 24-10.7 24-24V88c0-13.3-10.7-24-24-24s-24 10.7-24 24v49.4L390.5 120.6c-75-75-196.8-75-271.8 0c-26.1 26.1-45.9 57.6-58.2 92.4c-4.4 12.5 2.1 26.2 14.6 30.6s26.2-2.1 30.6-14.6zM406.9 309.4c-7.7 21.8-20.2 42.3-37.8 59.8c-62.5 62.5-163.8 62.5-226.3 0L125.7 352H176c13.3 0 24-10.7 24-24s-10.7-24-24-24H80c-13.3 0-24 10.7-24 24v96c0 13.3 10.7 24 24 24s24-10.7 24-24V399.4l17.5 17.5c75 75 196.8 75 271.8 0c26.1-26.1 45.9-57.6 58.2-92.4c4.4-12.5-2.1-26.2-14.6-30.6s-26.2 2.1-30.6 14.6z"/></svg><span data-i18n="opt_75"></span></button>
                </div>
                <div id="dict-status" style="font-size: 11px; margin-top: 5px; text-align: right;"></div>
            </div>
        </fieldset>

        <fieldset class="settings-section">
            <legend><span data-i18n="opt_76"></span></legend>
            
            <div class="form-group" style="display: flex; flex-direction: row; align-items: center; justify-content: space-between; background-color: #fff; padding: 10px 15px; border-radius: 6px; border: 1px solid #e0e0e0;">
                <label for="doli-opp-only" style="margin: 0; cursor: pointer; display: inline-block; font-size: 13px; font-weight: 600; flex: 1; padding-right: 10px;"><span data-i18n="opt_77"></span></label>
                <input type="checkbox" id="doli-opp-only" style="margin: 0; cursor: pointer; width: 18px; height: 18px; flex-shrink: 0;" checked>
            </div>
            <p style="font-size: 11px; color: #7f8c8d; margin-top: 5px; margin-bottom: 20px;"><span data-i18n="opt_78"></span></p>

            <div class="form-group">
                <label for="doli-contact-role"><span data-i18n="opt_contact_role"></span></label>
                <input type="text" id="doli-contact-role" data-i18n-placeholder="opt_ph_contact_role" list="role-codes-list">
                <datalist id="role-codes-list">
                    <option value="PROJECTCONTRIBUTOR">Contributeur</option>
                    <option value="PROJECTEXECUTIVE">Chef de projet</option>
                </datalist>
                <p style="font-size: 11px; color: #7f8c8d; margin-top: 5px; margin-bottom: 0;"><span data-i18n="opt_desc_contact_role"></span></p>
            </div>
        </fieldset>

        <fieldset class="settings-section">
            <legend><span data-i18n="opt_79"></span></legend>
            <div class="form-group">
                <label><span data-i18n="opt_80"></span></label>
                <div class="format-selection" style="grid-template-columns: 1fr 1fr;">
                    <label class="format-option">
                        <input type="radio" name="doli-default-view" value="ticket" checked>
                        <span class="format-card" style="padding: 10px;">
                            <span class="format-title" style="font-size: 14px;"><span data-i18n="opt_81"></span></span>
                        </span>
                    </label>
                    <label class="format-option">
                        <input type="radio" name="doli-default-view" value="opportunite">
                        <span class="format-card" style="padding: 10px;">
                            <span class="format-title" style="font-size: 14px;"><span data-i18n="opt_82"></span></span>
                        </span>
                    </label>
                    </label>
                </div>
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label for="doli-recent-count"><span data-i18n="opt_83"></span></label>
                <input type="number" id="doli-recent-count" min="0" max="50" value="10" data-i18n-placeholder="opt_ph_109">
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label for="doli-list-count"><span data-i18n="opt_list_count"></span></label>
                <input type="number" id="doli-list-count" min="5" max="500" value="15" placeholder="15">
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label for="doli-api-limit"><span data-i18n="opt_api_limit"></span></label>
                <input type="number" id="doli-api-limit" min="100" max="20000" value="5000" placeholder="5000">
            </div>
        </fieldset>

        <fieldset class="settings-section">
            <legend><span data-i18n="opt_84"></span></legend>
            <div class="form-group">
                <label><span data-i18n="opt_85"></span></label>
                <div class="format-selection">
                    <label class="format-option">
                        <input type="radio" name="doli-format" value="png" checked>
                        <span class="format-card">
                            <span class="format-title"><span data-i18n="opt_86"></span></span>
                            <span class="format-desc"><span data-i18n="opt_87"></span></span>
                        </span>
                    </label>
                    <label class="format-option">
                        <input type="radio" name="doli-format" value="jpg">
                        <span class="format-card">
                            <span class="format-title"><span data-i18n="opt_88"></span></span>
                            <span class="format-desc"><span data-i18n="opt_89"></span></span>
                        </span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="doli-blur"><span data-i18n="opt_90"></span></label>
                <input type="range" id="doli-blur" min="1" max="25" value="8" style="width: 100%; cursor: pointer;">
                <div style="display: flex; justify-content: space-between; font-size: 11px; color: #7f8c8d; margin-top: 5px;">
                    <span><span data-i18n="opt_91"></span></span>
                    <span id="doli-blur-value" style="font-weight: bold; color: #3498db;"><span data-i18n="opt_92"></span></span>
                    <span><span data-i18n="opt_93"></span></span>
                </div>
            </div>
            
            <div id="doli-blur-preview-container" class="preview-box">
                <div class="preview-text">
                    <p><span data-i18n="opt_94"></span></p>
                    <p><span data-i18n="opt_95"></span></p>
                </div>
                <div id="doli-blur-overlay"></div>
            </div>
        </fieldset>

    </div>
    <script src="../../src/utils/i18n.js"></script>
    <script src="../../src/utils/errors.js"></script>
    <script type="module" src="options.js"></script>
</body>
</html>
